name: Pipeline Go

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  teste:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verificar versão
        run: go version

      - name: Instalar dependências
        run: go mod tidy

      - name: Executar aplicação
        run: go run main.go

      - name: Executar testes
        run: go test ./...
